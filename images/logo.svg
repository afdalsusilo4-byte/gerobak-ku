<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C4A1E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B3A20;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="#D4A843" stroke-width="4"/>
  
  <!-- Outer ring decoration -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#D4A843" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  
  <!-- Gerobak/cart body -->
  <rect x="120" y="170" width="160" height="90" rx="8" fill="url(#cartGrad)" stroke="#A0A0A0" stroke-width="2"/>
  
  <!-- Cart roof/awning -->
  <path d="M110 170 L200 120 L290 170 Z" fill="url(#roofGrad)" stroke="#5C3A1E" stroke-width="2"/>
  
  <!-- Awning stripes -->
  <path d="M130 165 L200 132 L170 165 Z" fill="#8B5E3C" opacity="0.4"/>
  <path d="M190 132 L270 165 L230 165 Z" fill="#8B5E3C" opacity="0.4"/>
  
  <!-- Cart counter -->
  <rect x="130" y="185" width="140" height="15" rx="3" fill="#D4A843" stroke="#B8922E" stroke-width="1"/>
  
  <!-- Cart window/display -->
  <rect x="140" y="205" width="50" height="40" rx="4" fill="#FFF8E7" stroke="#C0C0C0" stroke-width="1"/>
  <rect x="210" y="205" width="50" height="40" rx="4" fill="#FFF8E7" stroke="#C0C0C0" stroke-width="1"/>
  
  <!-- Wheels -->
  <circle cx="155" cy="275" r="18" fill="#5C4A1E" stroke="#3D3010" stroke-width="2"/>
  <circle cx="155" cy="275" r="8" fill="#D4A843"/>
  <circle cx="245" cy="275" r="18" fill="#5C4A1E" stroke="#3D3010" stroke-width="2"/>
  <circle cx="245" cy="275" r="8" fill="#D4A843"/>
  
  <!-- Cart handle -->
  <rect x="285" y="195" width="8" height="55" rx="4" fill="#A0A0A0"/>
  <rect x="280" y="190" width="18" height="8" rx="4" fill="#C0C0C0"/>
  
  <!-- Steam lines -->
  <path d="M155 180 Q160 170 155 160" fill="none" stroke="#E8E8E8" stroke-width="2" opacity="0.6"/>
  <path d="M170 178 Q175 168 170 158" fill="none" stroke="#E8E8E8" stroke-width="2" opacity="0.5"/>
  <path d="M230 180 Q235 170 230 160" fill="none" stroke="#E8E8E8" stroke-width="2" opacity="0.6"/>
  
  <!-- Text: GEROBAK -->
  <text x="200" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#E8D5A0" letter-spacing="6">GEROBAK</text>
  
  <!-- Text: KU -->
  <text x="200" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#D4A843" letter-spacing="10">KU</text>
  
  <!-- Decorative dots -->
  <circle cx="145" cy="340" r="3" fill="#D4A843" opacity="0.6"/>
  <circle cx="255" cy="340" r="3" fill="#D4A843" opacity="0.6"/>
</svg>